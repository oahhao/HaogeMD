<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ErgeMD</title>
    <style>
      /* 防白闪：body 在渲染前就有深色背景 */
      body {
        margin: 0;
        padding: 0;
        background: #0A0A0F;
        color: #9ca3af;
        font-family: system-ui, -apple-system, sans-serif;
      }
    </style>
    <script>
      try {
        var s = JSON.parse(localStorage.getItem('ergemd-settings') || '{}');
        var t = (s.state && s.state.readingSettings && s.state.readingSettings.theme) || 'cyberpunk';
        if (t === 'system') t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
      } catch(e) {
        document.documentElement.setAttribute('data-theme', 'cyberpunk');
      }
    </script>
  </head>

  <body>
    <div id="root">
      <style>
        .app-loader {
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          height: 100vh;
          gap: 24px;
          opacity: 0;
          animation: loaderFadeIn 0.5s ease-out forwards;
        }
        .app-loader .logo {
          font-size: 48px;
          font-weight: 700;
          letter-spacing: -1px;
          background: linear-gradient(135deg, #00FFFF 0%, #BF00FF 50%, #FF6496 100%);
          -webkit-background-clip: text;
          background-clip: text;
          -webkit-text-fill-color: transparent;
          animation: logoPulse 2s ease-in-out infinite;
        }
        .app-loader .sub {
          font-size: 14px;
          color: #50505A;
          letter-spacing: 4px;
          text-transform: uppercase;
          animation: subPulse 2s ease-in-out infinite;
        }
        .app-loader .spinner {
          width: 32px;
          height: 32px;
          border: 2px solid rgba(0, 255, 255, 0.1);
          border-top-color: #00FFFF;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
        }
        @keyframes loaderFadeIn {
          from { opacity: 0; transform: translateY(8px); }
          to { opacity: 1; transform: translateY(0); }
        }
        @keyframes logoPulse {
          0%, 100% { filter: brightness(1); }
          50% { filter: brightness(1.3); }
        }
        @keyframes subPulse {
          0%, 100% { opacity: 0.4; }
          50% { opacity: 0.8; }
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
      <div class="app-loader">
        <div class="logo">ErgeMD</div>
        <div class="spinner"></div>
        <div class="sub">Loading...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
