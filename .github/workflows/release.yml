name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-0 libgtk-3-0 libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "HaogeMD ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Create portable package (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # tauri-action 可能使用 target/release 或 target/<triple>/release
          $possibleDirs = @(
            "src-tauri/target/x86_64-pc-windows-msvc/release",
            "src-tauri/target/release"
          )
          $src = $null
          foreach ($dir in $possibleDirs) {
            if (Test-Path $dir) {
              $exe = Get-ChildItem $dir -Filter "*.exe" | Where-Object { $_.Name -match "^(ErgeMD|HaogeMD)" } | Select-Object -First 1
              if ($exe) {
                $src = $dir
                $exePath = $exe.FullName
                Write-Host "Found exe: $exePath"
                break
              }
            }
          }
          if (-not $src) {
            Write-Error "No exe found in any target directory"
            exit 1
          }
          $dst = "HaogeMD-portable"
          New-Item -ItemType Directory -Path $dst -Force
          Copy-Item $exePath "$dst/HaogeMD.exe"
          $dll = Join-Path $src "WebView2Loader.dll"
          if (Test-Path $dll) {
            Copy-Item $dll $dst/
          }
          Compress-Archive -Path $dst -DestinationPath "HaogeMD-${{ github.ref_name }}-portable.zip" -Force
          gh release upload ${{ github.ref_name }} "HaogeMD-${{ github.ref_name }}-portable.zip" --clobber
          gh release edit ${{ github.ref_name }} --title "HaogeMD ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
