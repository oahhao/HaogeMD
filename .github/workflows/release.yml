name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm test
      - name: cargo test
        run: cd src-tauri && cargo test

  build:
    name: Build ${{ matrix.platform }} (${{ matrix.suffix }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: Install Linux deps
        if: matrix.suffix == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - run: pnpm install
      - name: Build Tauri app
        # 放弃 tauri-action@v0：之前步骤 0.13s 完成，根本没跑 build
        # 改用显式 pnpm tauri build，可控 100%
        shell: pwsh
        run: pnpm tauri build --target ${{ matrix.target }}
      - name: Rename bundles
        env:
          BUILD_PLATFORM: ${{ matrix.suffix }}
          BUILD_TARGET: ${{ matrix.target }}
        run: node scripts/rename-bundle.js
      - name: Create portable package (Windows)
        if: matrix.suffix == 'windows-x64'
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $src = "src-tauri/target/$target/release"
          $dst = "ErgeMD-portable"
          New-Item -ItemType Directory -Force -Path $dst
          # After rename-bundle.js, exe is named ErgeMD-v0.4.1.exe
          Copy-Item "$src/ErgeMD-${{ github.ref_name }}.exe" $dst/ErgeMD.exe
          Copy-Item "$src/*.dll" $dst/ -ErrorAction SilentlyContinue
          if (Test-Path "$src/WebView2Loader.dll") {
            Copy-Item "$src/WebView2Loader.dll" $dst/
          }
          Compress-Archive -Path $dst -DestinationPath "ErgeMD-${{ github.ref_name }}-windows-x64-portable.zip" -Force
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            **/ErgeMD-${{ github.ref_name }}-setup.exe
            **/ErgeMD-${{ github.ref_name }}-macos-*.dmg
            **/ErgeMD-${{ github.ref_name }}-linux-*.AppImage
            **/ErgeMD-${{ github.ref_name }}-linux-*.deb
            ErgeMD-${{ github.ref_name }}-windows-x64-portable.zip
          tag_name: ${{ github.ref_name }}
          name: 'ErgeMD ${{ github.ref_name }}'
          body: |
            See the assets to download and install this version.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
