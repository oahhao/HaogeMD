<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="100%" height="100%">
    <defs>
        <linearGradient id="boxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00E5FF" /><stop offset="100%" stop-color="#FF007F" />
        </linearGradient>
        <linearGradient id="neonPink" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FF007F" /><stop offset="100%" stop-color="#FF5E99" />
        </linearGradient>
        <!-- 核心改动：减小模糊半径至 2 和 8，让发光变紧致 -->
        <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur1" />
            <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2" />
            <feMerge><feMergeNode in="blur2" /><feMergeNode in="blur1" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
        <filter id="glowOuter" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="20" result="blur" />
            <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
    </defs>
    <!-- 外框 -->
    <rect x="112" y="112" width="800" height="800" rx="180" fill="none" stroke="url(#boxGradient)" stroke-width="20" filter="url(#glowOuter)" opacity="0.6" />
    <rect x="112" y="112" width="800" height="800" rx="180" fill="#0A0B10" fill-opacity="0.9" stroke="url(#boxGradient)" stroke-width="14" />
    <!-- 图标：使用微光滤镜 -->
    <g fill="none" stroke="url(#neonPink)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" filter="url(#subtleGlow)">
        <path d="M 510 260 L 330 260 L 330 620 L 510 620" />
        <path d="M 480 440 L 740 440 M 650 300 L 740 440 L 650 580" />
    </g>
    <!-- 文字：保持你满意的发光度 -->
    <text x="512" y="790" font-family="sans-serif" font-size="80" font-weight="600" fill="#00F0FF" text-anchor="middle" letter-spacing="4" filter="url(#subtleGlow)">ErgeMD</text>
</svg>
